server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: webket-monster

  datasource:
    url: jdbc:postgresql://localhost:5432/webket_monster_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 단계
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always